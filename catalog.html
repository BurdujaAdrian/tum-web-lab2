---
layout: layouts/base.njk
---
<div class="banner" style="margin: 2rem;">
  <h2>Catalogue</h2>
</div>

<div style="background-color: rgb(22,83,126); margin: 0 2rem 2rem; padding: 2rem;">
  <div class="products">
    {% for product in products.products%}
    {% if (product.hidden != true)%}
    <div>
    <img src="{{product.src | url}}" />
    <p> {{product.text}}</p>
    {% endif %}
    </div>
    {% endfor%}
  </div>
</div>
