---
layout : layouts/base.njk
---
<div class="banner" style="margin: 2rem;">
  <div class="mascot">
    <img src="/img/stickman.gif" />
    <div class="tooltip">Buy nothing today!</div>
  </div>
  <h2>You should buy nothing NOW !!</h2>
</div>

<div class="section-label" style="margin: 0 2rem;">
  <h3>Recommended products:</h3>
</div>

<div style="margin: 0 2rem 2rem; overflow: hidden;">
  <div class="slides">
    {% for product in products.products%}
    <div>
      <img src="{{product.src}}" />
      <p>{{product.text}}</p>
    </div>
    {% endfor%}
  </div>
</div>

<div class="mobile">
  <div class="info-card">
    <h3>Fun Fact of the day</h3>
    <p>
      — If things get too difficult, nothing is out there to help you.
    </p>
  </div>
</div>
